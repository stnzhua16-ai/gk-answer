function cl(t){return t.replace(/\s+/g,"").replace(/[，。．、；：！？《》（）【】""''…—]/g,"").toLowerCase()}
function searchKB(q){var qc=cl(q),best=null,bs=0;KB.forEach(function(x){var tc=cl(x.t),s=0;if(qc===tc)s=100;else if(tc.indexOf(qc)>=0||qc.indexOf(tc)>=0)s=80+Math.min(qc.length,tc.length)/Math.max(qc.length,tc.length)*15;else{var c=0;for(var i=0;i<qc.length;i++)if(tc.indexOf(qc[i])>=0)c++;s=40+c/Math.max(qc.length,tc.length)*40}if(s>bs&&s>30){bs=s;best=x}});return best}
function api(e,m,b,d){return fetch("http://activity.njsummer.cn/aliredpack2nd"+e,{method:m||"GET",headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):null}).then(function(r){return r.json()}).then(function(r){if(r.code==="700"&&(d||0)<3){sm("⏳ 重试中("+((d||0)+1)+"/3)...","info");return new Promise(function(rs){setTimeout(function(){rs(api(e,m,b,(d||0)+1))},3000)})}return r})}
function textMatch(a,b){var ca=cl(a),cb=cl(b);if(ca===cb)return true;if(ca.indexOf(cb)>=0||cb.indexOf(ca)>=0)return true;if(ca.length>20&&cb.length>20){var c=0;for(var i=0;i<ca.length;i++)if(cb.indexOf(ca[i])>=0)c++;if(c/Math.max(ca.length,cb.length)>0.6)return true}return false}
function doMatch(qs){var as=[],ds=[];qs.forEach(function(q,i){var m=searchKB(q.title);var d={idx:i+1,type:{1:"单选",2:"多选",3:"判断"}[q.type]||"?",title:q.title.substring(0,80)};if(m){d.ok=true;d.score=Math.round(m.s);var cts=m.ct.split("|");var ans="";if(q.type===2){var idxs=[];cts.forEach(function(ct){if(!ct.trim())return;q.options.forEach(function(o){if(textMatch(ct,o.option))idxs.push(o.index)})});ans=idxs.join(",")||m.a}else{for(var j=0;j<(q.options||[]).length;j++){if(textMatch(cts[0],q.options[j].option)){ans=q.options[j].index;break}}if(!ans)ans=m.a}d.ans=ans;d.desc=m.d;as.push({idStr:q.idStr,answer:ans})}else{d.ok=false;d.ans="?";d.desc="未匹配"}ds.push(d)});return{details:ds,answers:as,all:as.length===qs.length}}
g.onclick=function(){go()};cb.onclick=function(){cls()};
(function(){try{var s=localStorage.getItem("gk_uid");if(s){uid=s;sb.style.display="block";inp.style.display="none";cb.style.display="block"}}catch(e){}})();
function go(){var v=inp.value.trim();if(!v&&uid){doit();return}if(!v){sm("请粘贴链接或输入uuid","error");return}sm("解析中...","info");var km=v.match(/key=([^&]+)/),um=v.match(/uuid=([^&]+)/);if(km&&um)uid=um[1];else{var uo=v.match(/[a-f0-9]{32}/i);if(uo)uid=uo[0];else{sm("未识别到uuid","error");return}}try{localStorage.setItem("gk_uid",uid);sb.style.display="block";inp.style.display="none";cb.style.display="block"}catch(e){}doit()}
function cls(){try{localStorage.removeItem("gk_uid")}catch(e){}uid="";inp.value="";sb.style.display="none";inp.style.display="block";cb.style.display="none";sm("已清除","info")}
function doit(){res.innerHTML="";g.disabled=true;g.textContent="⏳ 自动答题中...";sm("① 检查账号...","info");
api("/checkInfo?uuid="+uid+"&key="+K).then(function(d){
if(d.code==="2300"){sm("② 获取题目...","info");return{code:"200"}}
else if(d.code==="2200"){sm("② 注册中...","info");return api("/updateInfo","POST",{key:K,uuid:uid,province:"北京市",city:"东城区",nickName:"答题助手",company:"",phone:""})}
else if(d.code==="1000")throw new Error("今日次数已用完")
else throw new Error(d.message||"状态异常")
}).then(function(r){if(r.code&&r.code!=="200")throw new Error(r.message||"注册失败");sm("③ 获取题目...","info");return api("/exam/getExam","POST",{key:K,uuid:uid})
}).then(function(e){if(e.code!=="200")throw new Error(e.message||"获取题目失败");sm("④ 匹配答案...","info");
var qs=e.data||[];if(!Array.isArray(qs))qs=[];var m=doMatch(qs);ans=m.answers;sm("✅ 匹配 "+ans.length+"/"+qs.length+" 题","success");
var h="";m.details.forEach(function(d){var sc=d.score>=80?"#059669":d.score>0?"#D97706":"#DC2626";
h+='<div class="item'+(d.ok?" ok":"")+'"><div class="h"><span class="n">'+d.idx+'</span>'+d.type+' <span style="color:'+sc+';margin-left:auto">匹配'+d.score+'%</span></div>';
h+='<div class="t">'+d.title+'</div><div class="a">✓ '+d.ans+'</div>';
if(d.desc&&d.desc!=="未匹配")h+='<div class="d">📖 '+d.desc.substring(0,120)+'</div>';h+='</div>'});
if(m.all)h+='<button class="btn-sub" onclick="sub()">📤 提交答案 · 查看成绩</button>';
res.innerHTML=h;g.disabled=false;g.textContent="🔄 重新答题"
}).catch(function(err){sm("❌ "+err.message,"error");g.disabled=false;g.textContent="🚀 开始自动答题"})}
function sub(){if(_sub){sm("请勿重复点击","error");return}if(!ans||!ans.length){sm("无答案","error");return}_sub=true;var sb=document.querySelector(".btn-sub");if(sb){sb.disabled=true;sb.textContent="⏳ 提交中..."}g.disabled=true;sm("📤 提交中...","info");
api("/exam/submit","POST",{time:30,dtoList:ans,aid:K,uuid:uid}).then(function(d){
if(d.code==="200"||d.code==="800"){var sc=(d.data&&d.data.score!=null)?d.data.score:(typeof d.data==="number"?d.data:(d.data||"100"));sm("🎉 得分: "+sc+" 分！","success");setTimeout(function(){location.href="http://file.njsummer.cn/gkzsactivity/success.html?key="+K+"&score="+sc+(d.code==="800"?"&result=800":"")},1000)}
else if(d.code==="1000")sm("今日次数已用完","error");else sm("失败["+d.code+"]: "+(d.message||""),"error");
_sub=false;g.disabled=false;g.textContent="🚀 开始自动答题";if(sb){sb.disabled=false;sb.textContent="📤 提交答案 · 查看成绩"}
}).catch(function(e){sm("失败: "+e.message,"error");_sub=false;g.disabled=false;g.textContent="🚀 开始自动答题";if(sb){sb.disabled=false;sb.textContent="📤 提交答案 · 查看成绩"}})}
</script></body></html>
