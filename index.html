if(d.code==="2300"){sm("② 已注册，获取题目中...","info");return{code:"200"}}
else if(d.code==="2200"){sm("② 正在注册...","info");return api("/updateInfo","POST",{key:KEY,uuid:uid,province:"北京市",city:"东城区",nickName:"平海干饭🐎",company:"",phone:""})}
else if(d.code==="1000")throw new Error("今日次数已用完")
else throw new Error(d.message||"状态异常")
}).then(function(r){if(r.code&&r.code!=="200")throw new Error(r.message||"注册失败");sm("③ 获取题目...","info");return api("/exam/getExam","POST",{key:KEY,uuid:uid})
}).then(function(e){if(e.code!=="200")throw new Error(e.message||"获取题目失败");sm("④ 匹配答案...","info");
var qs=e.data||[];if(!Array.isArray(qs))qs=[];var details=[],answers=[],tn={1:"单选",2:"多选",3:"判断"},tc={1:"rt1",2:"rt2",3:"rt3"};
qs.forEach(function(q,i){var m=searchKB(q.title);var d={idx:i+1,type:tn[q.type]||"?",title:q.title.substring(0,80),tc:tc[q.type]||"rt1"};
if(m){d.ok=true;d.score=Math.round(m.s);d.ans=m.a;d.desc=m.d;answers.push({idStr:q.idStr,answer:m.a})}else{d.ok=false;d.score=0;d.ans="?";d.desc="未匹配"}details.push(d)});
ans=answers;sm("✅ 匹配 "+answers.length+"/"+details.length+" 题","success");
var h="";details.forEach(function(d){var sc=d.score>=80?"#059669":d.score>0?"#D97706":"#DC2626";
h+='<div class="result-item'+(d.ok?" ok":"")+'"><div class="rh"><span class="num">'+d.idx+'</span><span class="rt '+d.tc+'">'+d.type+'</span><span class="rs" style="color:'+sc+'">匹配 '+d.score+"%</span></div>";
h+='<div class="rtitle">'+d.title+'</div><div class="rans"><span class="letter">'+d.ans+"</span> 正确答案</div>";
if(d.desc&&d.desc!=="未匹配")h+='<div class="rd">📖 '+d.desc.substring(0,150)+"</div>";h+="</div>"});
if(answers.length===qs.length)h+='<button class="btn-submit" onclick="sub()">📤 提交答案 · 查看成绩</button>';
_res.innerHTML=h;_g.disabled=false;_g.textContent="🔄 重新答题"
}).catch(function(err){sm("❌ "+err.message,"error");_g.disabled=false;_g.textContent="🚀 开始自动答题"})}
function sub(){if(!ans||!ans.length){sm("无答案","error");return}_g.disabled=true;sm("📤 提交中...","info");
api("/exam/submit","POST",{time:30,dtoList:ans,aid:KEY,uuid:uid}).then(function(d){
if(d.code==="200"||d.code==="800"){var sc=(d.data&&d.data.score!=null)?d.data.score:(typeof d.data==="number"?d.data:(d.data||"100"));sm("🎉 得分: "+sc+" 分！","success");setTimeout(function(){window.location.href="http://file.njsummer.cn/gkzsactivity/success.html?key="+KEY+"&score="+sc+(d.code==="800"?"&result=800":"")},1000)}
else if(d.code==="1000")sm("今日次数已用完","error");else sm("失败: ["+d.code+"] "+(d.message||""),"error");
_g.disabled=false;_g.textContent="🚀 开始自动答题"}).catch(function(e){sm("失败: "+e.message,"error");_g.disabled=false;_g.textContent="🚀 开始自动答题"})}
</script></body></html>
